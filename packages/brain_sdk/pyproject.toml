[project]
name = "brain-sdk"
version = "1.0.0"
description = "Knowledge brain SDK: chunking, embedding, vector/graph store abstractions"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "tiktoken>=0.7",
    "sentence-splitter>=1.4",
    "openai>=1.30",
    "qdrant-client>=1.9",
    "neo4j>=5.20",
    "shared-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brain_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
