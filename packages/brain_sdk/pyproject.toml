[project]
name = "brain-sdk"
version = "1.0.0"
description = "Knowledge brain SDK: chunking, embedding, vector/graph store abstractions"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "tiktoken>=0.7",
    "sentence-splitter>=1.4",
    "openai>=1.30",
    "qdrant-client>=1.9",
    "neo4j>=5.20",
    "shared-config",
]

[project.optional-dependencies]
# Optional LLM providers for the provider-agnostic knowledge engine (OpenAI is
# in the base deps and is the default). Install as needed, e.g. `brain-sdk[anthropic]`.
anthropic = ["anthropic>=0.40"]
gemini = ["google-generativeai>=0.8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brain_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: unit tests",
    "integration: integration tests requiring external services",
]
