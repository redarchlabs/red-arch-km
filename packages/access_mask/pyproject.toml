[project]
name = "access-mask"
version = "1.0.0"
description = "32-bit access mask encoding/decoding for RBAC permission system"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/access_mask"]

[tool.pytest.ini_options]
testpaths = ["tests"]
