include:
  - docker-compose.infra.yml

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: km2_api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-redarch}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-redarch_km}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - km2

  brain-api:
    build:
      context: ..
      dockerfile: docker/brain-api.Dockerfile
    container_name: km2_brain_api
    ports:
      - "8020:8020"
    env_file:
      - ../.env
    environment:
      # Override .env URLs for in-cluster service resolution.
      # Unprefixed keys match the BrainAPISettings `validation_alias` values.
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      # Qdrant's image ships no HTTP client for a healthcheck — rely on
      # the service being started and brain-api's own retries instead.
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8020/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - km2

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: km2_worker
    env_file:
      - ../.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      brain-api:
        condition: service_healthy
    networks:
      - km2

  celery-beat:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    container_name: km2_celery_beat
    env_file:
      - ../.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A worker.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    networks:
      - km2

  flower:
    image: mher/flower:2.0
    container_name: km2_flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - km2

  ui:
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    container_name: km2_ui
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    # node:22-alpine doesn't ship curl; use node's own http module instead.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - km2

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: km2_pgadmin
    ports:
      - "81:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@redarchlabs.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev-tools
    networks:
      - km2
