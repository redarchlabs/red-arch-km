services:
  postgres:
    image: postgres:18
    container_name: km2_postgres
    # In-cluster services reach postgres at postgres:5432 via the docker
    # network; the host port is only for external tools (psql, pgAdmin
    # outside Docker). 5433 avoids conflicts with other postgres stacks
    # bound to the default 5432.
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-redarch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-redarch_km}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redarch} -d ${POSTGRES_DB:-redarch_km}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - km2

  redis:
    image: redis:7.4-alpine
    container_name: km2_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - km2

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: km2_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    # Qdrant's image ships neither curl nor wget, so an HTTP healthcheck
    # can't run inside the container. Dependants (brain-api) use
    # `service_started` and rely on their own retry/backoff instead.
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - km2

  neo4j:
    image: neo4j:5.25.1
    container_name: km2_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - km2

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: km2_minio
    command: server /data --console-address ":9001"
    ports:
      # 9000 = S3 API (STORAGE_ENDPOINT), 9001 = web console.
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?Set STORAGE_SECRET_KEY in .env}
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - km2

  # One-shot init: create the documents bucket once MinIO is healthy, then exit.
  # MinIO does not auto-create buckets, so without this the first upload fails
  # with NoSuchBucket. Idempotent — safe to re-run on every `up`.
  createbuckets:
    image: minio/mc
    container_name: km2_createbuckets
    depends_on:
      minio:
        condition: service_healthy
    environment:
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?Set STORAGE_SECRET_KEY in .env}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-km-documents}
    entrypoint: >
      /bin/sh -c "
      until mc alias set k http://minio:9000 \"$${STORAGE_ACCESS_KEY}\" \"$${STORAGE_SECRET_KEY}\"; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb -p k/\"$${STORAGE_BUCKET}\" || true;
      echo \"bucket $${STORAGE_BUCKET} ready\";
      "
    restart: "no"
    networks:
      - km2

  # Dev mail catcher: accepts SMTP on 1025 and shows every captured message in a
  # web UI on 8025 (nothing is delivered externally). Point the API's SMTP_* env
  # at localhost:1025 to test intake-form emails end-to-end.
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: km2_mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI — open http://localhost:8025
    environment:
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    restart: unless-stopped
    networks:
      - km2

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  minio-data:

networks:
  km2:
    name: km2_network
